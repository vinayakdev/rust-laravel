name: release-rust-php

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.label }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-aarch64
            runs_on: macos-14
            asset_name: rust-php-macos-aarch64
            binary_path: target/release/rust-php
          - label: macos-x86_64
            runs_on: macos-13
            asset_name: rust-php-macos-x86_64
            binary_path: target/release/rust-php
          - label: linux-x86_64
            runs_on: ubuntu-22.04
            asset_name: rust-php-linux-x86_64
            binary_path: target/release/rust-php
          - label: windows-x86_64
            runs_on: windows-2022
            asset_name: rust-php-windows-x86_64.exe
            binary_path: target/release/rust-php.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Copy release asset
        shell: bash
        run: cp "${{ matrix.binary_path }}" "${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  publish:
    name: publish-release
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          find dist -maxdepth 2 -type f -exec cp {} release-assets/ \;

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
