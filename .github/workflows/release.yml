name: Release

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: dtolnay/rust-toolchain@stable

      - name: Build LSP binary
        run: cargo build --release --bin rust-php

      - name: Assemble bundle
        run: |
          VERSION=$(grep '^version' zed-extension/extension.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          mkdir -p bundle/extension/bin bundle/extension/src
          cp zed-extension/extension.toml   bundle/extension/
          cp zed-extension/Cargo.toml       bundle/extension/
          cp zed-extension/Cargo.lock       bundle/extension/
          cp zed-extension/src/lib.rs       bundle/extension/src/
          cp -r zed-extension/languages     bundle/extension/
          cp -r zed-extension/snippets      bundle/extension/
          cp target/release/rust-php        bundle/extension/bin/rust-php-macos-aarch64
          chmod +x                          bundle/extension/bin/rust-php-macos-aarch64
          printf '\n[workspace]\n' >> bundle/extension/Cargo.toml

          cat > bundle/INSTALL.md << 'EOF'
          # rust-laravel — Install

          1. Open Zed
          2. Open the Extensions panel (Cmd+Shift+X)
          3. Click Install Dev Extension
          4. Select the `extension/` folder inside this archive

          The LSP binary is bundled — no PATH changes or config needed.
          EOF

          zip -r rust-laravel-v${VERSION}-macos-aarch64.zip bundle

      - uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          prerelease: true
          generate_release_notes: true
          files: rust-laravel-*.zip
