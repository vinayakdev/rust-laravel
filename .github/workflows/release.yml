name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            bin_name: rust-php-macos-aarch64
            exe_suffix: ""
          - os: windows-latest
            bin_name: rust-php-windows-x86_64
            exe_suffix: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: dtolnay/rust-toolchain@stable

      - name: Build LSP binary
        run: cargo build --release --bin rust-php

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin_name }}
          path: target/release/rust-php${{ matrix.exe_suffix }}

  release:
    needs: build
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Assemble bundle and create release
        run: |
          VERSION=$(grep '^version' zed-extension/extension.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          mkdir -p bundle/extension/bin bundle/extension/src
          cp zed-extension/extension.toml   bundle/extension/
          cp zed-extension/Cargo.toml       bundle/extension/
          cp zed-extension/Cargo.lock       bundle/extension/
          cp zed-extension/src/lib.rs       bundle/extension/src/
          cp -r zed-extension/languages     bundle/extension/
          cp -r zed-extension/snippets      bundle/extension/
          printf '\n[workspace]\n' >> bundle/extension/Cargo.toml

          cp binaries/rust-php-macos-aarch64/rust-php       bundle/extension/bin/rust-php-macos-aarch64
          cp binaries/rust-php-windows-x86_64/rust-php.exe  bundle/extension/bin/rust-php-windows-x86_64.exe
          chmod +x bundle/extension/bin/rust-php-macos-aarch64

          cat > bundle/INSTALL.md << 'EOF'
          # rust-laravel — Install

          1. Open Zed
          2. Open the Extensions panel (Cmd+Shift+X)
          3. Click Install Dev Extension
          4. Select the `extension/` folder inside this archive

          The LSP binary is bundled — no PATH changes or config needed.
          EOF

          zip -r rust-laravel-v${VERSION}.zip bundle

      - uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          prerelease: true
          generate_release_notes: true
          files: rust-laravel-*.zip
