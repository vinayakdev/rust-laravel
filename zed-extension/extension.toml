id = "rust-laravel"
name = "Rust Laravel"
version = "0.1.3"
schema_version = 1
authors = ["vinayakdev"]
description = "Laravel route/config navigation and completion powered by rust-php."
repository = "https://github.com/vinayakdev/rust-laravel"
languages = ["PHP", "Blade"]
snippets = ["./snippets/php.json", "./snippets/blade.json"]

[lib]
kind = "Rust"
version = "0.7.0"

[language_servers.rust-php-lsp]
name = "rust-php-lsp"
languages = ["PHP", "Blade"]
language_ids = { PHP = "php", Blade = "blade" }

[bracket_pairs]
PHP = [
  { open = "{", close = "}" },
  { open = "[", close = "]" },
  { open = "(", close = ")" },
  { open = "\"", close = "\"" },
  { open = "'", close = "'" }
]

Blade = [
  { open = "{", close = "}" },
  { open = "[", close = "]" },
  { open = "(", close = ")" },
  { open = "\"", close = "\"" },
  { open = "'", close = "'" },
  { open = "{{", close = "}}" },
  { open = "{!!", close = "!!}" }
]
